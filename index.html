<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
      <title>GΞNΞSIS ΛNΛLYZΞR V8 💎</title>
      <script src="https://cdn.tailwindcss.com"></script>
      <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
      <style>
         :root { --premium-pink: #ff007a; --premium-gold: #ffcc00; --dark-bg: #05050a; }
         body { background: var(--dark-bg); color: #fff; font-family: 'Rajdhani', sans-serif; min-height: 100vh; }
         .premium-frame { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 0, 122, 0.3); border-radius: 24px; box-shadow: 0 0 30px rgba(255, 0, 122, 0.1); }
         .prediction-box { background: linear-gradient(145deg, rgba(20, 20, 30, 0.9), rgba(10, 10, 15, 0.9)); border: 2px solid var(--premium-pink); border-radius: 20px; position: relative; overflow: hidden; }
         .prediction-box::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(transparent, var(--premium-pink), transparent 30%); animation: rotate 6s linear infinite; z-index: -1; }
         @keyframes rotate { 100% { transform: rotate(360deg); } }
         .history-list-scroll { max-height: 400px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--premium-pink) transparent; }
         .history-list-scroll::-webkit-scrollbar { width: 5px; }
         .history-list-scroll::-webkit-scrollbar-thumb { background: var(--premium-pink); border-radius: 10px; }
         .stat-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; }
      </style>
   </head>
   <body class="p-4 flex flex-col items-center">
      <div class="w-full max-w-md space-y-4">
         <div class="text-center py-6">
            <h1 class="text-3xl font-black tracking-tighter" style="font-family: 'Orbitron', sans-serif;">
               <span class="text-white">GΞNΞSIS</span>
               <span class="text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-yellow-500">ΛNΛLYZΞR V8 💎</span>
            </h1>
         </div>

         <div class="grid grid-cols-3 gap-3">
            <div class="stat-card p-3 text-center">
               <div class="text-[10px] text-gray-500 uppercase tracking-widest">Accuracy</div>
               <div id="accuracy" class="text-lg font-bold text-green-400">0%</div>
            </div>
            <div class="stat-card p-3 text-center">
               <div class="text-[10px] text-gray-500 uppercase tracking-widest">Analyzed</div>
               <div id="total-count" class="text-lg font-bold text-blue-400">0</div>
            </div>
            <div class="stat-card p-3 text-center">
               <div class="text-[10px] text-gray-500 uppercase tracking-widest">AI Mode</div>
               <div id="ai4-mode-display" class="text-[10px] font-bold text-pink-500">TREND</div>
            </div>
         </div>

         <div class="prediction-box p-6 text-center">
            <div class="flex justify-between items-start mb-4">
               <span class="text-[10px] bg-pink-600 text-white px-2 py-1 rounded font-bold tracking-widest">V8 ACTIVE</span>
               <div class="text-right">
                  <div class="text-[9px] text-gray-400 uppercase">Next Period</div>
                  <div id="current-period" class="text-lg font-bold text-white tracking-widest">----</div>
               </div>
            </div>
            <div id="prediction-result" class="text-5xl font-black italic mb-2 text-white">SCANNING...</div>
            <div id="prediction-numbers" class="flex justify-center gap-2 mb-4">
               <span class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center text-sm font-bold">?</span>
               <span class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center text-sm font-bold">?</span>
            </div>
            <div class="h-1 w-full bg-gray-800 rounded-full overflow-hidden">
               <div id="confidence-bar" class="h-full bg-pink-500 transition-all duration-1000" style="width: 0%"></div>
            </div>
            <div class="text-[10px] text-gray-500 mt-2">Neural Analysis: <span id="confidence-text">0%</span></div>
         </div>

         <div class="premium-frame flex-grow flex flex-col overflow-hidden">
            <div class="p-4 border-b border-white/5 flex justify-between items-center bg-white/5">
               <h2 class="text-xs font-bold uppercase tracking-widest text-pink-500">Neural History Log</h2>
               <button onclick="clearHistory()" class="text-[10px] text-red-400 uppercase font-bold">Clear</button>
            </div>
            <div id="history-list" class="history-list-scroll divide-y divide-white/5"></div>
         </div>
      </div>

      <script>
         const API_URL = "https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json";
         let historyDB = JSON.parse(localStorage.getItem('genesis_v8_db')) || [];
         let lastProcessed = null;
         
         let ai4Mode = "TREND"; 
         let ai4LossStreak = 0;
         let ai4CycleStep = 0; 

         async function initApp() {
            await fetchAndRecoverData();
            setInterval(syncEngine, 3000);
         }

         async function fetchAndRecoverData() {
            try {
               const response = await fetch(`${API_URL}?t=${Date.now()}`);
               const data = await response.json();
               const list = data.data.list;
               document.getElementById('total-count').textContent = list.length;
               
               list.slice().reverse().forEach(item => {
                  if (!historyDB.find(x => x.period === item.issueNumber)) {
                     historyDB.unshift({
                        period: item.issueNumber,
                        prediction: '---', 
                        numbers: [],
                        status: 'DATA',
                        actualNum: item.number,
                        ai4Vote: 'UNKNOWN'
                     });
                  }
               });
               if (historyDB.length > 50) historyDB = historyDB.slice(0, 50);
               localStorage.setItem('genesis_v8_db', JSON.stringify(historyDB));
               renderHistory();
               runCalculatorAI(list);
               lastProcessed = list[0].issueNumber;
            } catch (e) {}
         }

         async function syncEngine() {
            try {
               const response = await fetch(`${API_URL}?t=${Date.now()}`);
               const data = await response.json();
               const list = data.data.list;
               if (list[0].issueNumber !== lastProcessed) {
                  lastProcessed = list[0].issueNumber;
                  updateHistoryWithResult(list[0]);
                  runCalculatorAI(list);
               }
            } catch (e) {}
         }

         function getSmartNumbers(list, verdict) {
            const last10 = list.slice(0, 10).map(x => parseInt(x.number));
            const range = verdict === 'BIG' ? [5, 6, 7, 8, 9] : [0, 1, 2, 3, 4];
            
            const counts = {};
            range.forEach(n => counts[n] = 0);
            last10.forEach(n => { if(range.includes(n)) counts[n]++; });

            const sorted = Object.keys(counts).sort((a, b) => counts[b] - counts[a]);
            
            let high = parseInt(sorted[0]); // Most frequent
            let low = parseInt(sorted[sorted.length - 1]); // Least frequent/None

            // Fallback random agar kuch na mile
            if (isNaN(high)) high = range[Math.floor(Math.random() * range.length)];
            if (isNaN(low) || low === high) {
               const remaining = range.filter(n => n !== high);
               low = remaining[Math.floor(Math.random() * remaining.length)];
            }

            return [high, low];
         }

         function runCalculatorAI(list) {
            const rawData = list.map(x => ({ 
               num: parseInt(x.number), 
               size: parseInt(x.number) <= 4 ? 'SMALL' : 'BIG' 
            }));
            const nextP = (BigInt(list[0].issueNumber) + 1n).toString();
            const results = rawData.map(x => x.size);

            let ai1Vote = results[0]; 
            if (results[0] === results[1]) ai1Vote = results[0]; 
            else if (results[0] !== results[1] && results[1] !== results[2]) ai1Vote = results[0] === 'BIG' ? 'SMALL' : 'BIG'; 
            if (results[0] === results[1] && results[2] === results[3] && results[0] !== results[2]) ai1Vote = results[0] === 'BIG' ? 'SMALL' : 'BIG';

            let ai2Vote = (parseInt(list[0].number) <= 4) ? 'SMALL' : 'BIG';
            const ai3Vote = (rawData.slice(0, 5).filter(x => x.size === 'SMALL').length >= 3) ? "SMALL" : "BIG";

            const scanArea = rawData.slice(0, 20);
            const bigs = scanArea.filter(x => x.size === 'BIG').length;
            const smalls = scanArea.filter(x => x.size === 'SMALL').length;
            const majority = bigs >= smalls ? "BIG" : "SMALL";
            const minority = majority === "BIG" ? "SMALL" : "BIG";
            let ai4Vote = (ai4Mode === "TREND") ? majority : minority;

            let sPoints = (ai1Vote === 'SMALL' ? 30 : 0) + (ai2Vote === 'SMALL' ? 30 : 0) + (ai3Vote === 'SMALL' ? 10 : 0) + (ai4Vote === 'SMALL' ? 30 : 0);
            let bPoints = (ai1Vote === 'BIG' ? 30 : 0) + (ai2Vote === 'BIG' ? 30 : 0) + (ai3Vote === 'BIG' ? 10 : 0) + (ai4Vote === 'BIG' ? 30 : 0);

            const verdict = sPoints > bPoints ? "SMALL" : "BIG";
            const finalNums = getSmartNumbers(list, verdict);

            updateUI(nextP, verdict, finalNums, Math.max(sPoints, bPoints));
            saveLog(nextP, verdict, finalNums, ai4Vote);
         }

         function updateUI(p, res, nums, conf) {
            document.getElementById('current-period').textContent = p.slice(-4);
            const resEl = document.getElementById('prediction-result');
            resEl.textContent = res;
            resEl.className = `text-5xl font-black italic mb-2 ${res === 'BIG' ? 'text-yellow-400' : 'text-pink-500'}`;
            document.getElementById('confidence-bar').style.width = conf + '%';
            document.getElementById('confidence-text').textContent = conf + '%';
            document.getElementById('ai4-mode-display').textContent = ai4Mode + (ai4CycleStep > 0 ? ` (${ai4CycleStep}/3)` : "");
            document.getElementById('prediction-numbers').innerHTML = nums.map(n => 
               `<span class="w-8 h-8 rounded-full bg-white/10 border border-white/20 flex items-center justify-center text-sm font-bold">${n}</span>`
            ).join('');
         }

         function updateHistoryWithResult(latest) {
            const actualSize = parseInt(latest.number) <= 4 ? 'SMALL' : 'BIG';
            const actualNum = parseInt(latest.number);

            historyDB.forEach(item => {
               if (item.period === latest.issueNumber && item.status === 'pending') {
                  item.actualNum = latest.number;
                  
                  // JACKPOT CHECK 🎰
                  if (item.numbers.includes(actualNum)) {
                     item.status = 'JACKPOT 🎰';
                  } else {
                     item.status = (item.prediction === actualSize) ? 'WIN' : 'LOSS';
                  }
                  
                  // AI 4 CYCLE Logic
                  if (ai4Mode === "TREND" && ai4CycleStep === 0) {
                     if (item.ai4Vote !== actualSize) {
                        ai4LossStreak++;
                        if (ai4LossStreak >= 2) { ai4Mode = "BALANCING"; ai4CycleStep = 1; ai4LossStreak = 0; }
                     } else { ai4LossStreak = 0; }
                  } else {
                     ai4CycleStep++;
                     if (ai4CycleStep > 3) {
                        ai4Mode = (ai4Mode === "BALANCING") ? "TREND" : "BALANCING";
                        ai4CycleStep = 1;
                     }
                  }
               }
            });
            renderHistory();
         }

         function saveLog(period, prediction, numbers, ai4Vote) {
            if (!historyDB.find(x => x.period === period)) {
               historyDB.unshift({ period, prediction, numbers, status: 'pending', actualNum: '?', ai4Vote });
               if (historyDB.length > 50) historyDB.pop();
               localStorage.setItem('genesis_v8_db', JSON.stringify(historyDB));
               renderHistory();
            }
         }

         function renderHistory() {
            const listEl = document.getElementById('history-list');
            const total = historyDB.filter(i => i.status !== 'pending' && i.status !== 'DATA').length;
            const wins = historyDB.filter(i => i.status === 'WIN' || i.status === 'JACKPOT 🎰').length;
            document.getElementById('accuracy').textContent = total > 0 ? Math.round((wins/total)*100)+'%' : '0%';
            
            listEl.innerHTML = historyDB.map(item => `
               <div class="p-4 flex justify-between items-center ${item.status.includes('JACKPOT') ? 'bg-yellow-500/10' : item.status === 'WIN' ? 'bg-green-500/5' : item.status === 'LOSS' ? 'bg-red-500/5' : 'bg-white/5'}">
                  <div>
                     <div class="text-[10px] text-gray-500 tracking-tighter">PERIOD: ${item.period.slice(-4)}</div>
                     <div class="font-bold ${item.prediction === 'BIG' ? 'text-yellow-400' : item.prediction === 'SMALL' ? 'text-pink-500' : 'text-gray-400'}">${item.prediction}</div>
                  </div>
                  <div class="text-center">
                     <div class="text-[9px] text-gray-400">NUM</div>
                     <div class="text-lg font-bold">${item.actualNum}</div>
                  </div>
                  <div class="text-right">
                     <div class="text-[10px] font-bold ${item.status.includes('JACKPOT') ? 'text-yellow-400' : item.status === 'WIN' ? 'text-green-500' : item.status === 'LOSS' ? 'text-red-500' : 'text-blue-400'}">${item.status}</div>
                     <div class="text-[8px] text-gray-600 tracking-widest">${item.numbers.join(', ')}</div>
                  </div>
               </div>
            `).join('');
         }

         function clearHistory() {
            historyDB = [];
            localStorage.removeItem('genesis_v8_db');
            ai4Mode = "TREND"; ai4LossStreak = 0; ai4CycleStep = 0;
            fetchAndRecoverData();
         }

         initApp();
      </script>
   </body>
</html>
